name = "count-the-rs-agent"
version = "0.1.0"
score_pass_threshold = 0.8
dspy_version = ">=2.5,<3.0"

[runtime]
system_dependency_commands = []

[evaluation.input]
fields = [{ key = "message", label = "Message", required = true, multiline = true }]

[evaluation.label]
fields = [{ key = "expected_r_count", label = "Expected r/R count", required = true, multiline = false }]

[optimization]
target_output_fields = ["r_count"]
