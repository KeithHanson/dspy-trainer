services:
  postgres:
    image: postgres:16-alpine
    container_name: dspy-trainer-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dspy_trainer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dspy_trainer"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: dspy-trainer-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: dspy-trainer-mlflow
    command: >-
      mlflow server
      --host 0.0.0.0
      --port 5000
      --allowed-hosts mlflow,mlflow:5000,localhost,localhost:5000,localhost:5001,127.0.0.1,127.0.0.1:5000,127.0.0.1:5001
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5001:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  litellm-proxy:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: dspy-trainer-litellm-proxy
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local-dev-master-key}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/dspy_trainer?schema=litellm
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:-sk-local-dev-salt-key-32-chars-minimum}
      STORE_MODEL_IN_DB: ${STORE_MODEL_IN_DB:-True}
      LITELLM_MIGRATION_DIR: /tmp/litellm-migrations
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./ops/litellm-proxy/config.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; req=urllib.request.Request('http://localhost:4000/health/liveness', headers={'Authorization': 'Bearer ' + os.environ.get('LITELLM_MASTER_KEY', '')}); urllib.request.urlopen(req, timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 180s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dspy-trainer-backend
    environment:
      DSPY_TRAINER_POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/dspy_trainer
      DSPY_TRAINER_REDIS_URL: redis://redis:6379/0
      DSPY_TRAINER_QUEUE_NAME: dspy-trainer:jobs
      DSPY_TRAINER_MLFLOW_TRACKING_URI: http://mlflow:5000
      DSPY_TRAINER_LITELLM_BASE_URL: http://litellm-proxy:4000
      DSPY_TRAINER_LITELLM_API_KEY: ${LITELLM_MASTER_KEY:-sk-local-dev-master-key}
      DSPY_TRAINER_GITHUB_PAT: ${GITHUB_PAT:-}
      DSPY_TRAINER_GIT_COMMIT_NAME: ${GIT_COMMIT_NAME:-DSPy Trainer}
      DSPY_TRAINER_GIT_COMMIT_EMAIL: ${GIT_COMMIT_EMAIL:-dspy-trainer@local}
      DSPY_TRAINER_BACKEND_HOST: 0.0.0.0
      DSPY_TRAINER_BACKEND_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      litellm-proxy:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - bundles_data:/tmp/dspy-trainer/bundles
      - checkouts_data:/tmp/dspy-trainer/checkouts
      - optimization_artifacts_data:/tmp/dspy-trainer/optimization_artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    develop:
      watch:
        - action: sync+restart
          path: ./backend/app
          target: /app/backend/app
          ignore:
            - __pycache__/
            - "*.pyc"
        - action: sync+restart
          path: ./backend/worker.py
          target: /app/backend/worker.py
        - action: rebuild
          path: ./backend/requirements.txt
        - action: rebuild
          path: ./backend/Dockerfile

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "backend/worker.py"]
    deploy:
      replicas: 8
    environment:
      DSPY_TRAINER_POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/dspy_trainer
      DSPY_TRAINER_REDIS_URL: redis://redis:6379/0
      DSPY_TRAINER_QUEUE_NAME: dspy-trainer:jobs
      DSPY_TRAINER_MLFLOW_TRACKING_URI: http://mlflow:5000
      DSPY_TRAINER_LITELLM_BASE_URL: http://litellm-proxy:4000
      DSPY_TRAINER_LITELLM_API_KEY: ${LITELLM_MASTER_KEY:-sk-local-dev-master-key}
      DSPY_TRAINER_GITHUB_PAT: ${GITHUB_PAT:-}
      DSPY_TRAINER_GIT_COMMIT_NAME: ${GIT_COMMIT_NAME:-DSPy Trainer}
      DSPY_TRAINER_GIT_COMMIT_EMAIL: ${GIT_COMMIT_EMAIL:-dspy-trainer@local}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      litellm-proxy:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - bundles_data:/tmp/dspy-trainer/bundles
      - checkouts_data:/tmp/dspy-trainer/checkouts
      - optimization_artifacts_data:/tmp/dspy-trainer/optimization_artifacts
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, redis; redis.Redis.from_url(os.environ['DSPY_TRAINER_REDIS_URL']).ping()\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    develop:
      watch:
        - action: sync+restart
          path: ./backend/app
          target: /app/backend/app
          ignore:
            - __pycache__/
            - "*.pyc"
        - action: sync+restart
          path: ./backend/worker.py
          target: /app/backend/worker.py
        - action: rebuild
          path: ./backend/requirements.txt
        - action: rebuild
          path: ./backend/Dockerfile

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: dspy-trainer-web
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    develop:
      watch:
        - action: rebuild
          path: ./web/src
        - action: rebuild
          path: ./web/index.html
        - action: rebuild
          path: ./web/nginx.conf
        - action: rebuild
          path: ./web/package.json
        - action: rebuild
          path: ./web/package-lock.json
        - action: rebuild
          path: ./web/Dockerfile

volumes:
  postgres_data:
  mlflow_artifacts:
  bundles_data:
  checkouts_data:
  optimization_artifacts_data:
